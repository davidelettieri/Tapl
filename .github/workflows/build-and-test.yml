# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  TAPL_OCAML_HARNESS_IMAGE: tapl-ocaml-harness:ci

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
        source-url: https://nuget.pkg.github.com/<owner>/index.json
      env:
          NUGET_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal

  harness:
    runs-on: ubuntu-latest
    needs:
    - build

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: recursive
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
        source-url: https://nuget.pkg.github.com/<owner>/index.json
      env:
          NUGET_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
    - name: Restore dependencies
      run: dotnet restore
    - name: Build harness dependencies
      run: dotnet build --no-restore
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build harness image
      uses: docker/build-push-action@v6
      with:
        context: ./docker/ocaml-harness
        file: ./docker/ocaml-harness/Dockerfile
        load: true
        tags: ${{ env.TAPL_OCAML_HARNESS_IMAGE }}
        cache-from: type=gha,scope=ocaml-harness
        cache-to: type=gha,mode=max,scope=ocaml-harness
    - name: Run harness comparisons
      env:
        TAPL_DOCKER_USE_HOST_USER: false
      run: ./scripts/compare-tapl.sh all
